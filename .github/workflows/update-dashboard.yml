name: Update Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - 'config.yml'
      - 'scripts/**'
      - '.github/workflows/update-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate dashboard
        env:
          # DASHBOARD_TOKEN is a PAT with `repo` + `read:user` scopes so commit
          # search and the contributions GraphQL API return the full user view
          # (the default GITHUB_TOKEN is too restricted to see all of them).
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_TOKEN || secrets.GITHUB_TOKEN }}
        run: python -m scripts.generate

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet dashboard.svg; then
            echo "No changes to dashboard.svg"
          else
            git add dashboard.svg
            git commit -m "chore: refresh dashboard"
            git push
          fi
