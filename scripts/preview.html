<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>8enji dashboard preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-outer: #07090d;
    --bg: #0e1218;
    --panel: rgba(255, 255, 255, 0.012);
    --border: rgba(148, 163, 184, 0.16);
    --border-soft: rgba(148, 163, 184, 0.10);
    --text: #cdd6e1;
    --text-dim: #8b95a3;
    --muted: #5a6473;
    --muted-soft: #3f4753;
    --accent: #b6e04f;
    --accent-glow: rgba(182, 224, 79, 0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-outer); color: var(--text); }
  body { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; min-height: 100vh; font-size: 13px; line-height: 1.5; }
  .layout { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }

  aside { background: var(--bg); border-right: 1px solid var(--border-soft); padding: 24px; overflow-y: auto; max-height: 100vh; }
  aside h1 { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 0 0 4px; font-weight: 600; }
  aside h1 .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); vertical-align: middle; margin-right: 10px; }
  aside .sub { font-size: 11px; color: var(--muted-soft); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 28px; }
  aside h2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 28px 0 14px; font-weight: 600; border-top: 1px dashed var(--border-soft); padding-top: 18px; }
  aside h2:first-of-type { border-top: 0; padding-top: 0; }

  .field { margin-bottom: 16px; }
  .field-label { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--text); margin-bottom: 6px; }
  .field-label .val { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .field input[type="range"] { width: 100%; height: 18px; accent-color: var(--accent); background: transparent; }
  .field input[type="color"] { width: 100%; height: 38px; padding: 2px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  .field.toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .field.toggle input { width: 32px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .field.toggle label { font-size: 12px; color: var(--text); cursor: pointer; }

  pre.yaml { background: var(--bg-outer); border: 1px solid var(--border-soft); border-radius: 4px; padding: 14px 16px; font-size: 11px; line-height: 1.55; overflow-x: auto; color: var(--text); margin: 0; font-family: inherit; }
  pre.yaml .k { color: var(--accent); }
  pre.yaml .v { color: var(--text); }
  pre.yaml .b { color: #c8a2ff; }
  pre.yaml .n { color: #f1c47a; }
  pre.yaml .s { color: #5fb7ff; }

  button { width: 100%; background: var(--accent); color: #07090d; border: 0; padding: 10px 16px; font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 4px; margin-top: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; transition: filter 0.1s; }
  button:hover { filter: brightness(1.1); }
  button.secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  button.secondary:hover { color: var(--text); border-color: var(--text-dim); }

  main { background: #0a0d12; padding: 28px; overflow: auto; }
  .stage { max-width: 1500px; margin: 0 auto; }
  .stage .frame { background: var(--bg); border-radius: 14px; overflow: hidden; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.04) inset; }
  .stage img { display: block; width: 100%; height: auto; }
  .stage .caption { font-size: 11px; color: var(--muted); margin: 14px 4px 0; letter-spacing: 0.08em; text-transform: uppercase; }
  .stage .caption b { color: var(--text-dim); font-weight: 500; }
</style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1><span class="dot"></span>tweaks</h1>
      <p class="sub">readme.dashboard / live preview</p>

      <h2>Color</h2>
      <div class="field">
        <div class="field-label"><span>Accent</span><span class="val" data-for="accent"></span></div>
        <input type="color" data-key="accent" value="#b6e04f">
      </div>

      <h2>Size</h2>
      <div class="field">
        <div class="field-label"><span>ASCII size</span><span class="val" data-for="ascii_size">5px</span></div>
        <input type="range" data-key="ascii_size" data-suffix="px" min="3" max="14" step="1" value="5">
      </div>
      <div class="field">
        <div class="field-label"><span>Bar height</span><span class="val" data-for="bar_height">14px</span></div>
        <input type="range" data-key="bar_height" data-suffix="px" min="6" max="24" step="1" value="14">
      </div>
      <div class="field">
        <div class="field-label"><span>Font scale</span><span class="val" data-for="font_scale">1.00x</span></div>
        <input type="range" data-key="font_scale" data-suffix="x" data-format="float" min="0.7" max="1.4" step="0.05" value="1.0">
      </div>

      <h2>Visibility</h2>
      <div class="field toggle">
        <input type="checkbox" id="t-statusbar" data-key="show_statusbar" checked>
        <label for="t-statusbar">Show statusbar</label>
      </div>
      <div class="field toggle">
        <input type="checkbox" id="t-sysinfo" data-key="show_sysinfo" checked>
        <label for="t-sysinfo">Show sysinfo block</label>
      </div>
      <div class="field toggle">
        <input type="checkbox" id="t-secondnow" data-key="show_second_now_col" checked>
        <label for="t-secondnow">Two-column NOW</label>
      </div>

      <h2>config.yml snippet</h2>
      <pre class="yaml" id="yaml-out"></pre>
      <button id="copy-btn">Copy to clipboard</button>
      <button class="secondary" id="reset-btn">Reset to saved</button>
    </aside>

    <main>
      <div class="stage">
        <div class="frame"><img id="preview" src="/render.svg" alt="dashboard preview"></div>
        <div class="caption">readme.svg <b>· fixture data · live re-render</b></div>
      </div>
    </main>
  </div>

<script>
  const inputs = document.querySelectorAll('[data-key]');
  const yamlOut = document.getElementById('yaml-out');
  const preview = document.getElementById('preview');
  const copyBtn = document.getElementById('copy-btn');
  const resetBtn = document.getElementById('reset-btn');
  let savedState = null;

  function readState() {
    const state = {};
    inputs.forEach(input => {
      const key = input.dataset.key;
      let val;
      if (input.type === 'checkbox') val = input.checked;
      else if (input.type === 'range') val = parseFloat(input.value);
      else val = input.value;
      state[key] = val;
    });
    return state;
  }

  function updateValueDisplays() {
    document.querySelectorAll('.val').forEach(el => {
      const key = el.dataset.for;
      if (!key) return;
      const input = document.querySelector(`[data-key="${key}"]`);
      if (!input) return;
      const suffix = input.dataset.suffix || '';
      const fmt = input.dataset.format;
      let v;
      if (input.type === 'range') {
        v = parseFloat(input.value);
        if (fmt === 'float') v = v.toFixed(2);
      } else {
        v = input.value;
      }
      el.textContent = String(v) + suffix;
    });
  }

  function toYaml(state) {
    const lines = ['tweaks:'];
    const order = ['accent', 'ascii_size', 'bar_height', 'show_statusbar', 'show_sysinfo', 'show_second_now_col', 'font_scale'];
    for (const k of order) {
      if (!(k in state)) continue;
      const v = state[k];
      let cls, formatted;
      if (typeof v === 'string') { cls = 's'; formatted = `"${v}"`; }
      else if (typeof v === 'boolean') { cls = 'b'; formatted = String(v); }
      else { cls = 'n'; formatted = String(v); }
      lines.push(`  <span class="k">${k}</span>: <span class="${cls}">${formatted}</span>`);
    }
    return lines.join('\n');
  }

  let updateTimer;
  function update() {
    updateValueDisplays();
    const state = readState();
    yamlOut.innerHTML = toYaml(state);
    document.documentElement.style.setProperty('--accent', state.accent);
    clearTimeout(updateTimer);
    updateTimer = setTimeout(() => {
      const params = new URLSearchParams();
      for (const [k, v] of Object.entries(state)) params.set(k, v);
      preview.src = '/render.svg?' + params.toString() + '&t=' + Date.now();
    }, 60);
  }

  function applyState(state) {
    inputs.forEach(input => {
      const key = input.dataset.key;
      if (!(key in state)) return;
      if (input.type === 'checkbox') input.checked = state[key];
      else input.value = state[key];
    });
    update();
  }

  inputs.forEach(input => input.addEventListener('input', update));

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(yamlOut.textContent);
    const original = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = original, 1500);
  });

  resetBtn.addEventListener('click', () => {
    if (savedState) applyState(savedState);
  });

  fetch('/api/tweaks').then(r => r.json()).then(state => {
    savedState = state;
    applyState(state);
  });
</script>
</body>
</html>
